<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#a83e32">
  <meta name="description" content="诗趣雅集：每日一诗与诗词互动">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/yaji.css">
  <title>诗趣雅集 · 每日一诗</title>
</head>
<body>
<header class="nav wrap"><a class="brand" href="/"><span class="seal" id="seal">诗</span><span><b id="brand">诗笺</b><small id="pageName">诗趣雅集</small></span></a><div class="actions"><select id="language"><option value="zh-Hans">简体中文</option><option value="zh-Hant">繁體中文</option></select><a href="/" id="back">诗笺随阅</a><button id="menuButton">☰</button></div></header>
<main>
<section class="hero wrap"><span id="slogan">日课一诗，闲时雅戏</span><h1 id="dailyTitle">每日一诗</h1><p id="dailyDesc">一日一诗，与古人如期相逢</p></section>
<section class="daily-layout wrap" id="daily">
  <aside class="calendar"><div class="calendar-head"><button id="prevMonth" aria-label="上个月">‹</button><b id="monthTitle"></b><button id="nextMonth" aria-label="下个月">›</button></div><div class="week" id="week"></div><div class="days" id="days"></div><div class="calendar-foot"><button id="todayButton">返回今日</button><div class="streak" id="streak"></div></div></aside>
  <article class="poem-card" id="poemCard"><div class="state" id="state">正在送来今日诗笺…</div><div id="poemContent" class="hidden"><div class="card-top"><span class="type" id="poemType"></span><button id="favorite">♡</button></div><div class="poem-body"><h2 id="poemTitle"></h2><p class="byline" id="byline"></p><div class="verses" id="verses"></div></div><div class="tools"><button id="dictionary">查字模式</button><button id="fullscreen">全屏阅读</button><button id="generate">生成卡片</button><button id="translation">查询译文</button><button id="share">分享诗词</button><button id="copy">抄录全诗</button><a id="openMain" href="/">前往完整诗笺</a><select id="poemLanguage"><option value="zh-Hans">简体</option><option value="zh-Hant">繁體</option></select></div><div class="card-bottom"><span id="selectedDate"></span><span id="poemNumber"></span></div></div></article>
</section>
<section class="games" id="games"><div class="wrap"><div class="games-head"><span id="gamesName">诗词雅戏</span><h2 id="gamesTitle">诗词雅戏</h2><p id="gamesLead">以诗为戏，在字句之间温故知新。</p></div><div class="game-grid"><article class="game"><h3 id="solitaire">联句续章</h3><p id="solitaireDesc">承前句余韵，续写下一章</p><span class="preparing">筹备中</span></article><article class="game"><h3 id="riddle">诗谜寻踪</h3><p id="riddleDesc">隐去诗题或诗人，循字句猜其来处</p><span class="preparing">筹备中</span></article><article class="game"><h3 id="fill">补阙成章</h3><p id="fillDesc">补全缺落字句，使诗章复原</p><span class="preparing">筹备中</span></article></div></div></section>
</main>
<nav class="bottom"><a href="/">⌂<span id="navHome">随阅</span></a><button data-target="#daily">▣<span id="navDaily">日课</span></button><button data-target="#games">◇<span id="navGames">雅戏</span></button><button id="navMenu">☰<span id="navMenuText">目录</span></button></nav>
<div class="menu-panel hidden" id="menu"><a href="/" id="menuHome">诗笺随阅</a><a href="#daily" id="menuDaily">每日一诗</a><a href="#games" id="menuGames">诗词雅戏</a><a href="/status.html" id="menuStatus">API 状态</a><a href="https://github.com/steamaa1/chinese-poetry-vue" target="_blank" id="menuSource">项目源码</a></div>
<div class="overlay hidden" id="overlay"><button class="close" id="closeFullscreen">退出全屏</button><div class="overlay-paper"><h2 id="overlayTitle"></h2><p class="byline" id="overlayByline"></p><div class="verses" id="overlayVerses"></div></div></div>
<script src="/locales/yaji-zh-Hant.js"></script><script src="/yaji.js"></script>
</body>
</html>
